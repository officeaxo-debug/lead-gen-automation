name: Weekly Blog Post Generation

on:
  schedule:
    # Run every Monday at 9 AM UTC (5 PM AEST)
    - cron: '0 9 * * 1'
  workflow_dispatch:  # Allow manual trigger

jobs:
  generate-blogs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install anthropic
      
      - name: Generate and upload blog posts
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python blog_generator.py
      
      - name: Commit and push results
        run: |
          git config user.name "Blog Bot"
          git config user.email "blog@clarkey.dev"
          git add blog_generation_log.json
          git commit -m "📝 Weekly blog posts generated: $(date +'%Y-%m-%d')" || true
          git push
